name: CI

on:
  pull_request:
    branches: [main, production]
  push:
    branches: [main, production]

# Dedupe stale runs on the same branch — only the latest push/PR push
# is built, older runs are cancelled automatically.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build & test
    runs-on: ubuntu-latest

    # NODE_AUTH_TOKEN must be available at job level (not step level) so
    # that actions/setup-node can restore the npm cache with `.npmrc`
    # substitution resolved in the same environment.
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Regression guard for the rolldown/hoisting trap documented in
      # DEVLOG.md 2026-04-10. If the vite override in root package.json
      # stops working (e.g. vitest pulls in vite@8 again under a different
      # name, or someone removes the override), we'd re-introduce rolldown
      # and its per-platform native binding, which npm#4828 silently skips
      # on linux-x64. Fail fast on PR instead of on Railway.
      - name: Verify vite singleton and no rolldown
        run: |
          if [ -d node_modules/rolldown ]; then
            echo "::error::node_modules/rolldown/ reappeared — the vite override in package.json is no longer effective. See DEVLOG.md 2026-04-10."
            exit 1
          fi
          VITE_COUNT=$(npm ls vite --all 2>/dev/null | grep -oE 'vite@[0-9]+\.[0-9]+\.[0-9]+' | sort -u | wc -l)
          echo "Distinct resolved vite versions in tree: $VITE_COUNT"
          if [ "$VITE_COUNT" -ne 1 ]; then
            echo "::error::Expected exactly one resolved vite version (enforced by overrides); found $VITE_COUNT. See DEVLOG.md 2026-04-10."
            npm ls vite --all || true
            exit 1
          fi

      - name: Build all packages
        run: npm run build

      - name: Run test suite
        run: npm test
